---
layout: default
---
<article class="post-article">

  <header class="post-header">
    <div class="container">
      <div class="post-meta">
        <span class="label-text" style="display:inline-block; margin-bottom:0;">// post</span>
        <time class="post-date" datetime="{{ page.date | date_to_xmlschema }}">
          {{ page.date | date: "%B %-d, %Y" }}
        </time>
      </div>
      <h1 class="post-title">{{ page.title }}</h1>
      {% if page.description %}
        <p class="post-description">{{ page.description }}</p>
      {% endif %}
    </div>
  </header>

  <div class="post-content container">
    {{ content }}
  </div>

  <div class="container" style="margin-top: 48px; padding-top: 24px; border-top: 0.5px solid #1c1e23;">
    <a href="{{ '/blog/' | relative_url }}" class="back-link">← All posts</a>
  </div>

</article>
